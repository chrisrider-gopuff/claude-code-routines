# Daily Brief — schedule configuration
#
# Runs every weekday (Mon–Fri) at 4:45 PM Eastern.
# Eastern Standard Time  = UTC-5  → 21:45 UTC
# Eastern Daylight Time  = UTC-4  → 20:45 UTC
# The harness handles DST automatically when timezone is specified.

name: daily-brief
prompt: routines/daily-brief/prompt.md
schedule:
  cron: "45 16 * * 1-5"       # 4:45 PM local — harness applies timezone below
  timezone: America/New_York
