# Daily Brief — schedule configuration
#
# Runs every weekday (Mon–Fri) at 9:15 AM Eastern.
# Eastern Standard Time  = UTC-5  →  14:15 UTC
# Eastern Daylight Time  = UTC-4  →  13:15 UTC
# The harness handles DST automatically when timezone is specified.

name: daily-brief
prompt: routines/daily-brief/prompt.md
schedule:
  cron: "15 9 * * 1-5"        # 9:15 AM Eastern, Mon–Fri — harness applies timezone below
  timezone: America/New_York
