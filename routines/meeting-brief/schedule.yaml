# Meeting Brief Digest — schedule configuration
#
# Runs every weekday (Mon–Fri) at 7:00 AM Eastern.
# Eastern Standard Time  = UTC-5  →  12:00 UTC
# Eastern Daylight Time  = UTC-4  →  11:00 UTC
# The harness handles DST automatically when timezone is specified.

name: meeting-brief
prompt: routines/meeting-brief/prompt.md
schedule:
  cron: "0 7 * * 1-5"          # 7:00 AM Eastern, Mon–Fri — harness applies timezone below
  timezone: America/New_York
