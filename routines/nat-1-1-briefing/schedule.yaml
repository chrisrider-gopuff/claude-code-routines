# Nat 1:1 Briefing — schedule configuration
#
# Fires once, every weekday (Mon–Fri) at 3:00 AM Eastern, into a fresh
# session. That single session covers the whole routine end to end: it
# builds and presents the draft, Chris edits it conversationally in the
# same session, and Chris tells Claude to publish when ready (see
# prompt.md). There is no external trigger and no separate API-fired
# phase — this is the only schedule this routine needs.
#
# Eastern Standard Time  = UTC-5  ->  08:00 UTC
# Eastern Daylight Time  = UTC-4  ->  07:00 UTC
# The harness handles DST automatically when timezone is specified.

name: nat-1-1-briefing
prompt: routines/nat-1-1-briefing/prompt.md
schedule:
  cron: "0 3 * * 1-5"          # 3:00 AM Eastern, Mon–Fri — harness applies timezone below
  timezone: America/New_York
